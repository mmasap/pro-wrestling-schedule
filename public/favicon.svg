<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#e8141e"/>
  <!-- Wrestling ring ropes (3 horizontal lines) -->
  <line x1="4" y1="11" x2="28" y2="11" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4" y1="16" x2="28" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4" y1="21" x2="28" y2="21" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Ring posts (4 corners) -->
  <rect x="3" y="8" width="3" height="16" rx="1" fill="white"/>
  <rect x="26" y="8" width="3" height="16" rx="1" fill="white"/>
</svg>
